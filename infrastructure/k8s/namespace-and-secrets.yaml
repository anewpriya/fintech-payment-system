# Namespace for all fintech services
apiVersion: v1
kind: Namespace
metadata:
  name: fintech
  labels:
    name: fintech

---
# Secrets for sensitive configuration
apiVersion: v1
kind: Secret
metadata:
  name: fintech-secrets
  namespace: fintech
  labels:
    app: fintech

type: Opaque
stringData:
  # Database connection string (base64 encoded in production)
  database-url: "postgresql://fintech_user:fintech_password@postgres-rds.c9akciq32.us-east-1.rds.amazonaws.com:5432/fintech_db"
  
  # API keys (if using external services)
  ip-reputation-api-key: "your-maxmind-api-key"
  
  # OAuth2 secrets (for API authentication)
  oauth2-client-secret: "your-oauth2-secret"

---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: fintech-config
  namespace: fintech
  labels:
    app: fintech

data:
  # Kafka configuration
  KAFKA_BROKERS: "kafka-cluster.kafka:9092"
  KAFKA_CONSUMER_GROUP: "fintech-service"
  
  # Redis configuration
  REDIS_URL: "redis://redis-cluster.fintech:6379/0"
  
  # API configuration
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  DEBUG: "false"
  
  # Fraud detection configuration
  FRAUD_THRESHOLD: "75"
  FRAUD_TIER2_TIMEOUT_MS: "50"
  
  # Monitoring
  PROMETHEUS_PORT: "8001"

---
# Service account for fintech services
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fintech-service-account
  namespace: fintech
  labels:
    app: fintech

---
# Role for fintech services
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fintech-role
  namespace: fintech
  labels:
    app: fintech

rules:
# Allow reading ConfigMaps
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]

# Allow reading Secrets
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]

# Allow reading Pods (for debugging)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

# Allow reading Logs
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]

---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fintech-rolebinding
  namespace: fintech
  labels:
    app: fintech

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fintech-role

subjects:
- kind: ServiceAccount
  name: fintech-service-account
  namespace: fintech

---
# Network Policy (restrict traffic)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fintech-network-policy
  namespace: fintech
  labels:
    app: fintech

spec:
  podSelector:
    matchLabels:
      app: fintech

  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow from API gateway
  - from:
    - podSelector:
        matchLabels:
          app: api-gateway
    ports:
    - protocol: TCP
      port: 8000

  # Allow from fraud detection
  - from:
    - podSelector:
        matchLabels:
          app: fraud-detection
    ports:
    - protocol: TCP
      port: 8000

  egress:
  # Allow to Kafka
  - to:
    - namespaceSelector:
        matchLabels:
          name: kafka
    ports:
    - protocol: TCP
      port: 9092

  # Allow to PostgreSQL
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 5432

  # Allow to Redis
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379

  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53