# CI/CD Pipeline for Fintech Payment System
# Runs on every push to main branch

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_NAME: fintech

jobs:
  # ========================================================================
  # TESTING
  # ========================================================================

  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      kafka:
        image: confluentinc/cp-kafka:7.5.0
        env:
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
        ports:
          - 9092:9092

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio

    - name: Run linting
      run: |
        pip install flake8
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Initialize test database
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
      run: |
        python -c "from src.database import init_db; init_db()"

    - name: Run unit tests
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        KAFKA_BROKERS: localhost:9092
        REDIS_URL: redis://localhost:6379/0
      run: |
        pytest tests/unit/ -v --cov=src --cov-report=xml

    - name: Run integration tests
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        KAFKA_BROKERS: localhost:9092
        REDIS_URL: redis://localhost:6379/0
      run: |
        pytest tests/integration/ -v

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  # ========================================================================
  # SECURITY SCANNING
  # ========================================================================

  security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Run Bandit security scan
      run: |
        bandit -r src/ -f json -o bandit-report.json || true

    - name: Check for vulnerable dependencies
      run: |
        safety check --json || true

    - name: Run SAST with Semgrep
      uses: returntocorp/semgrep-action@v1
      with:
        config: >-
          p/security-audit
          p/python
          p/owasp-top-ten

  # ========================================================================
  # BUILD & PUSH DOCKER IMAGE
  # ========================================================================

  build:
    needs: [test, security]
    runs-on: ubuntu-latest
    
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push API Gateway image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./infrastructure/docker/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/fintech-api-gateway:latest
          ${{ secrets.DOCKER_USERNAME }}/fintech-api-gateway:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Fraud Detection image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./infrastructure/docker/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/fintech-fraud-detection:latest
          ${{ secrets.DOCKER_USERNAME }}/fintech-fraud-detection:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Settlement image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./infrastructure/docker/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/fintech-settlement:latest
          ${{ secrets.DOCKER_USERNAME }}/fintech-settlement:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ========================================================================
  # DEPLOY TO KUBERNETES
  # ========================================================================

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Configure kubectl
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Create namespace
      run: |
        kubectl create namespace fintech --dry-run=client -o yaml | kubectl apply -f -

    - name: Apply secrets
      run: |
        kubectl apply -f infrastructure/k8s/namespace-and-secrets.yaml

    - name: Apply deployments
      run: |
        kubectl apply -f infrastructure/k8s/api-gateway-deployment.yaml
        kubectl apply -f infrastructure/k8s/fraud-detection-deployment.yaml
        kubectl apply -f infrastructure/k8s/settlement-deployment.yaml

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/api-gateway -n fintech --timeout=5m
        kubectl rollout status deployment/fraud-detection -n fintech --timeout=5m
        kubectl rollout status deployment/settlement -n fintech --timeout=5m

    - name: Verify deployment
      run: |
        kubectl get pods -n fintech
        kubectl get services -n fintech

    - name: Smoke test
      run: |
        API_URL=$(kubectl get service api-gateway-service -n fintech -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        curl -f http://$API_URL/health || exit 1

  # ========================================================================
  # NOTIFY
  # ========================================================================

  notify:
    needs: [test, security, build, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Determine status
      id: status
      run: |
        if [ "${{ needs.test.result }}" = "failure" ] || \
           [ "${{ needs.security.result }}" = "failure" ] || \
           [ "${{ needs.build.result }}" = "failure" ] || \
           [ "${{ needs.deploy.result }}" = "failure" ]; then
          echo "status=failure" >> $GITHUB_OUTPUT
        else
          echo "status=success" >> $GITHUB_OUTPUT
        fi

    - name: Send Slack notification
      uses: slackapi/slack-github-action@v1
      with:
        payload: |
          {
            "text": "Fintech CI/CD Pipeline: ${{ steps.status.outputs.status }}",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Fintech Payment System CI/CD*\n*Status:* ${{ steps.status.outputs.status }}\n*Branch:* main\n*Commit:* ${{ github.sha }}"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK